<div class="w-full h-full bg-[#0A0A0A] flex flex-col items-center overflow-y-auto pb-10">
  
  <!-- Top App Bar -->
  <div class="w-full pt-10 pb-4 px-4 flex items-center shrink-0 border-b border-white/5 relative z-20">
    <button (click)="navigateBack()" class="w-10 h-10 flex items-center justify-center mr-2">
      <span class="material-icons text-white">arrow_back</span>
    </button>
    <span class="text-white font-bold text-xl">Pago NFC</span>
  </div>

  <div class="h-10"></div>

  <!-- Realistic Bus Reader (Validator) UI -->
  <div class="w-[200px] h-[280px] bg-gradient-to-b from-[#1A1A1A] to-[#0A0A0A] rounded-t-[40px] rounded-b-[20px] border-[4px] border-[#222222] flex flex-col items-center p-4 shadow-2xl shadow-brand-accent/5 relative z-20 transition-all duration-500"
       [ngClass]="status === 'SUCCESS' ? 'shadow-green-500/20 border-[#2A3A2A]' : ''">
    
    <!-- Validator Screen -->
    <div class="w-full h-[110px] bg-black rounded-lg border p-2 flex items-center justify-center relative overflow-hidden transition-colors duration-500"
         [ngClass]="status === 'SUCCESS' ? 'border-green-500/50' : 'border-white/10'">
      <!-- Grid pattern overlay for "screen" effect -->
      <div class="absolute inset-0 opacity-20 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-white/30 via-transparent to-transparent bg-[length:4px_4px]"></div>
      
      <div class="relative z-10 flex flex-col items-center justify-center w-full h-full transition-opacity duration-300">
        
        <ng-container *ngIf="status === 'IDLE'">
          <span class="text-white/60 text-[10px] font-bold text-center tracking-wide leading-tight">
            ACERQUE<br>SU CELULAR
          </span>
        </ng-container>

        <ng-container *ngIf="status === 'READING'">
          <span class="text-brand-accent text-xs font-bold animate-pulse tracking-widest">PROCESANDO</span>
        </ng-container>

        <ng-container *ngIf="status === 'SUCCESS'">
          <span class="material-icons text-green-500 text-[36px] mb-1 drop-shadow-[0_0_15px_rgba(34,197,94,0.9)]">check_circle</span>
          <span class="text-green-500 text-[10px] font-bold tracking-widest drop-shadow-[0_0_10px_rgba(34,197,94,0.9)]">PAGO APROBADO</span>
        </ng-container>
      </div>
    </div>

    <div class="h-6"></div>

    <!-- NFC Target Icon -->
    <span class="material-icons text-[70px] transition-all duration-500"
          [ngClass]="status === 'SUCCESS' ? 'text-green-500 drop-shadow-[0_0_25px_rgba(34,197,94,1)] scale-110' : (status === 'READING' ? 'text-brand-accent/80 animate-pulse' : 'text-white/20')">
      contactless
    </span>
  </div>

  <div class="flex-1"></div>

  <!-- Phone Animation Overlay (Simulated) -->
  <div class="w-full h-[180px] flex flex-col items-center justify-start relative mt-4">
    
    <!-- Wave animations when READING -->
    <div *ngIf="status === 'READING'" class="absolute inset-0 flex items-center justify-center pointer-events-none mt-10">
      <div class="w-24 h-24 rounded-full border-[3px] border-brand-accent/60 animate-ping absolute" style="animation-duration: 1.5s;"></div>
      <div class="w-36 h-36 rounded-full border-[2px] border-brand-accent/40 animate-ping absolute" style="animation-duration: 1.5s; animation-delay: 0.3s"></div>
    </div>

    <!-- Success Text Container (Slides up and fades in using Tailwind classes) -->
    <div class="flex flex-col items-center transition-all duration-500 ease-out z-10 absolute top-0"
         [ngClass]="status === 'SUCCESS' ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8 pointer-events-none'">
      <span class="text-green-500 font-black text-4xl drop-shadow-[0_0_15px_rgba(34,197,94,0.5)]">-$3.500</span>
      <span class="text-green-400 font-bold text-[13px] mt-3 px-5 py-2 bg-green-500/10 rounded-full border border-green-500/30 text-center shadow-[0_0_20px_rgba(34,197,94,0.2)]">
        Pago realizado correctamente
      </span>
    </div>

    <span class="text-white/40 text-sm z-10 transition-all duration-300 absolute top-4"
          [ngClass]="status === 'IDLE' ? 'opacity-100' : 'opacity-0'">
      Listo para pagar
    </span>

    <!-- Phone mockup sliding up using Tailwind state instead of keyframes -->
    <div class="absolute w-36 h-48 border-[5px] rounded-t-[36px] bg-[#111111] backdrop-blur-md flex flex-col justify-start items-center pt-5 transition-all duration-[600ms] ease-[cubic-bezier(0.2,0.8,0.2,1)] z-30"
         [ngClass]="[
           isPhoneVisible ? 'bottom-[-60px] opacity-100 scale-100' : 'bottom-[-200px] opacity-0 scale-90',
           status === 'SUCCESS' ? 'border-green-500 shadow-[0_-25px_60px_rgba(34,197,94,0.35)]' : 'border-white/20 shadow-[0_-20px_50px_rgba(232,160,32,0.25)]'
         ]">
      <!-- Phone Speaker -->
      <div class="w-14 h-1.5 bg-white/20 rounded-full mb-8"></div>
      
      <!-- Inside phone success screen -->
      <div class="flex flex-col items-center justify-center w-full transition-all duration-500"
           [ngClass]="status === 'SUCCESS' ? 'opacity-100 scale-100' : 'opacity-0 scale-75'">
        <div class="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center mb-2 border border-green-500/30">
          <span class="material-icons text-green-500 text-3xl">done</span>
        </div>
        <span class="text-white font-bold text-xs tracking-wide">¡Pago Exitoso!</span>
      </div>
    </div>
  </div>

  <!-- Bottom Balance Card -->
  <div class="w-full px-6 mt-2 relative z-40 transition-all duration-500"
       [ngClass]="status === 'SUCCESS' ? 'opacity-100' : 'opacity-100'">
    <div class="w-full bg-gradient-to-br from-[#1A1A1A] to-[#0A0A0A] rounded-[24px] border border-white/10 p-6 flex flex-col items-center shadow-xl">
      <span class="text-brand-accent text-[11px] font-bold tracking-widest uppercase">Saldo Disponible</span>
      <!-- Number morphing class to draw attention when it changes -->
      <span class="text-white font-black text-[32px] mt-2 transition-all duration-500"
            [ngClass]="status === 'SUCCESS' ? 'text-green-400 scale-110 drop-shadow-[0_0_10px_rgba(34,197,94,0.4)]' : ''">
        {{ availableBalance }}
      </span>
    </div>
  </div>

  <!-- Mock Trigger -->
  <div class="mt-6 px-6 w-full relative z-40 transition-all duration-300"
       [ngClass]="status === 'IDLE' ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'">
    <button (click)="startReading()" class="w-full bg-brand-accent text-black font-extrabold text-[15px] h-14 rounded-2xl shadow-lg shadow-brand-accent/30 active:scale-95 transition-transform">
      Simular Pago
    </button>
  </div>
  
</div>
