<div class="relative w-full h-screen bg-white overflow-hidden flex flex-col">
  <!-- Black Top Background -->
  <div class="w-full h-[38%] bg-neutral-black flex flex-col items-center pt-12">
    <!-- SmartBus Fake Logo -->
    <div class="w-28 h-28 rounded-3xl bg-gradient-to-br from-brand-gold to-brand-gold-dark flex items-center justify-center shadow-2xl shadow-brand-gold/20">
      <span class="text-neutral-black text-5xl font-black tracking-tighter">SB</span>
    </div>
  </div>

  <!-- White Card Section -->
  <div class="absolute bottom-0 w-full h-[68%] bg-white rounded-t-[32px] shadow-2xl shadow-black overflow-y-auto px-8 pt-8 pb-6 flex flex-col items-center gap-6">
    
    <!-- Header -->
    <div class="w-full flex flex-col">
      <div class="flex items-center gap-2.5 mb-2">
        <div class="w-1 h-7 rounded-sm bg-brand-gold"></div>
        <h2 class="text-brand-gold text-2xl font-black tracking-widest">SmartBus</h2>
      </div>
      <h3 class="text-neutral-black text-2xl font-extrabold">Bienvenido de nuevo</h3>
      <p class="text-gray-500 text-xs tracking-wide mt-1">Ingresa tus credenciales para continuar</p>
    </div>

    <!-- Form Inputs -->
    <div class="w-full flex flex-col gap-3 mt-2">
      <!-- Email -->
      <div class="relative w-full">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <span class="material-icons text-brand-gold text-xl">email</span>
        </div>
        <input type="email" placeholder="Correo electrónico" class="w-full h-14 pl-12 pr-4 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold transition-colors">
      </div>

      <!-- Password -->
      <div class="relative w-full">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <span class="material-icons text-brand-gold text-xl">lock</span>
        </div>
        <input [type]="isPasswordVisible ? 'text' : 'password'" placeholder="Contraseña" class="w-full h-14 pl-12 pr-12 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold transition-colors">
        <button (click)="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-brand-gold focus:outline-none">
          <span class="material-icons text-xl">{{ isPasswordVisible ? 'visibility' : 'visibility_off' }}</span>
        </button>
      </div>

      <button class="text-brand-gold text-xs font-semibold text-right w-full mt-1">¿Olvidaste tu contraseña?</button>
    </div>

    <!-- Login Button (Solid style for login, so I will inline it here or use ui-button if it supports solid) -->
    <!-- I will inline a solid gold button to match the mockup perfectly -->
    <button (click)="login()" class="w-full h-14 rounded-2xl bg-brand-gold text-neutral-black font-extrabold text-base shadow-lg shadow-brand-gold/30 active:scale-95 transition-all">
      Iniciar Sesión
    </button>

    <!-- Social Login -->
    <div class="w-full flex flex-col items-center">
      <div class="flex items-center my-2 w-full">
        <div class="flex-grow h-px bg-gray-200"></div>
        <span class="px-4 text-gray-400 text-xs">O continúa con</span>
        <div class="flex-grow h-px bg-gray-200"></div>
      </div>

      <button (click)="googleSignIn()" class="w-full h-14 mt-4 rounded-2xl border border-gray-200 bg-white text-neutral-black font-bold text-sm flex items-center justify-center gap-3 transition-colors hover:bg-gray-50">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Continuar con Google
      </button>
    </div>

    <!-- Register Link -->
    <div class="flex items-center gap-1 mt-auto">
      <span class="text-gray-500 text-sm">¿No tienes cuenta?</span>
      <a routerLink="/register" class="text-brand-gold font-bold text-sm">Regístrate</a>
    </div>
  </div>
</div>
