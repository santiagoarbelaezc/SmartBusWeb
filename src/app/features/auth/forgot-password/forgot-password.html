<div class="relative w-full h-screen bg-white overflow-hidden flex flex-col">
  <!-- Black Top Background -->
  <div class="w-full h-[38%] bg-brand-primary-dark flex flex-col items-center pt-12">
    <!-- Back Button -->
    <button (click)="goBack()" class="absolute top-10 left-4 w-10 h-10 flex items-center justify-center rounded-full bg-white/10 text-white backdrop-blur-md active:scale-95 transition-transform border border-white/20 z-10">
      <span class="material-icons text-xl">arrow_back</span>
    </button>
    
    <!-- SmartBus Fake Logo -->
    <div class="w-28 h-28 rounded-3xl bg-gradient-to-br from-brand-primary to-brand-primary-dark flex items-center justify-center shadow-2xl shadow-brand-primary/20">
      <span class="text-white text-5xl font-black tracking-tighter">SB</span>
    </div>
  </div>

  <!-- White Card Section -->
  <div class="absolute bottom-0 w-full h-[68%] bg-white rounded-t-[32px] shadow-2xl shadow-black overflow-y-auto px-8 pt-8 pb-6 flex flex-col items-center gap-6">
    
    <ng-container *ngIf="!isEmailSent">
      <!-- Header -->
      <div class="w-full flex flex-col mt-2">
        <h3 class="text-neutral-black text-2xl font-extrabold">Recuperar contraseña</h3>
        <p class="text-gray-500 text-sm mt-2">Ingresa tu correo electrónico asociado a la cuenta y te enviaremos un enlace para restaurar tu contraseña.</p>
      </div>

      <!-- Form Inputs -->
      <div class="w-full flex flex-col gap-4 mt-2">
        <!-- Email -->
        <div class="relative w-full">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="material-icons text-brand-primary text-xl">email</span>
          </div>
          <input type="email" placeholder="Correo electrónico" class="w-full h-14 pl-12 pr-4 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-colors">
        </div>
      </div>

      <!-- Send Button -->
      <button (click)="sendRecoveryEmail()" class="w-full h-14 mt-4 rounded-2xl bg-brand-accent text-black font-extrabold text-[15px] shadow-lg shadow-brand-accent/30 active:scale-95 transition-transform flex items-center justify-center gap-2">
        <span *ngIf="!isLoading">Enviar enlace</span>
        <span *ngIf="isLoading" class="material-icons animate-spin text-xl">sync</span>
      </button>
    </ng-container>

    <ng-container *ngIf="isEmailSent">
      <div class="w-full flex flex-col items-center justify-center mt-10">
        <!-- Success Icon -->
        <div class="w-24 h-24 rounded-full bg-green-500/10 flex items-center justify-center mb-6">
          <span class="material-icons text-green-500 text-[60px]">mark_email_read</span>
        </div>
        
        <h3 class="text-neutral-black text-2xl font-extrabold text-center mb-2">¡Revisa tu correo!</h3>
        <p class="text-gray-500 text-sm text-center px-4">Hemos enviado un enlace de recuperación. Por favor, verifica tu bandeja de entrada o la carpeta de spam.</p>

        <!-- Back to Login Button -->
        <button routerLink="/login" class="w-full h-14 mt-10 rounded-2xl border border-gray-200 bg-white text-neutral-black font-extrabold text-[15px] shadow-sm active:scale-95 transition-transform">
          Volver a iniciar sesión
        </button>
      </div>
    </ng-container>

  </div>
</div>
