<div class="relative w-full h-screen bg-white overflow-hidden flex flex-col">
  <!-- Black Top Background -->
  <div class="w-full h-[28%] bg-neutral-black flex flex-col items-center pt-8">
    <div class="w-24 h-24 rounded-3xl bg-gradient-to-br from-brand-gold to-brand-gold-dark flex items-center justify-center shadow-2xl shadow-brand-gold/20">
      <span class="text-neutral-black text-4xl font-black tracking-tighter">SB</span>
    </div>
  </div>

  <!-- White Card Section -->
  <div class="absolute bottom-0 w-full h-[75%] bg-white rounded-t-[32px] shadow-2xl shadow-black overflow-hidden flex flex-col">
    <!-- Scrollable content -->
    <div class="flex-1 overflow-y-auto px-8 py-6 flex flex-col gap-4">
      
      <!-- Header -->
      <div class="w-full flex flex-col mb-2">
        <h2 class="text-brand-gold text-3xl font-black tracking-widest">SmartBus</h2>
        <h3 class="text-neutral-black text-xl font-bold mt-1">Información Personal</h3>
      </div>

      <!-- Form Inputs -->
      <div class="w-full flex flex-col gap-3">
        <!-- Full Name -->
        <div class="relative w-full">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="material-icons text-brand-gold text-xl">person</span>
          </div>
          <input type="text" placeholder="Nombre completo" class="w-full h-14 pl-12 pr-4 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold">
        </div>

        <!-- Document Row -->
        <div class="flex gap-3">
          <!-- Type Dropdown -->
          <div class="relative w-1/3">
            <button (click)="toggleDocMenu()" class="w-full h-14 px-3 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm flex items-center justify-between focus:outline-none focus:border-brand-gold">
              <span>{{ docType }}</span>
              <span class="material-icons text-gray-400 text-sm">arrow_drop_down</span>
            </button>
            <div *ngIf="showDocTypeMenu" class="absolute top-16 left-0 w-full bg-white border border-gray-200 rounded-xl shadow-lg z-10 overflow-hidden">
              <button (click)="selectDocType('C.C.')" class="w-full px-4 py-2 text-left hover:bg-gray-50 text-sm">C.C.</button>
              <button (click)="selectDocType('C.E.')" class="w-full px-4 py-2 text-left hover:bg-gray-50 text-sm">C.E.</button>
              <button (click)="selectDocType('T.I.')" class="w-full px-4 py-2 text-left hover:bg-gray-50 text-sm">T.I.</button>
            </div>
          </div>
          
          <!-- Document Number -->
          <div class="relative w-2/3">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-icons text-brand-gold text-xl">badge</span>
            </div>
            <input type="number" placeholder="Documento" class="w-full h-14 pl-12 pr-4 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold">
          </div>
        </div>

        <!-- Phone -->
        <div class="relative w-full">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center">
            <span class="text-neutral-black font-bold text-sm">+57</span>
            <div class="w-px h-4 bg-brand-gold/30 mx-2"></div>
          </div>
          <input type="tel" placeholder="Celular" class="w-full h-14 pl-16 pr-4 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold">
        </div>

        <!-- Email -->
        <div class="relative w-full">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="material-icons text-brand-gold text-xl">email</span>
          </div>
          <input type="email" placeholder="Correo electrónico" class="w-full h-14 pl-12 pr-4 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold">
        </div>

        <!-- Password -->
        <div class="relative w-full">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="material-icons text-brand-gold text-xl">lock</span>
          </div>
          <input [type]="isPasswordVisible ? 'text' : 'password'" placeholder="Contraseña" class="w-full h-14 pl-12 pr-12 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold">
          <button (click)="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-brand-gold focus:outline-none">
            <span class="material-icons text-xl">{{ isPasswordVisible ? 'visibility' : 'visibility_off' }}</span>
          </button>
        </div>

        <!-- Confirm Password -->
        <div class="relative w-full">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="material-icons text-brand-gold text-xl">lock</span>
          </div>
          <input [type]="isPasswordVisible ? 'text' : 'password'" placeholder="Confirmar contraseña" class="w-full h-14 pl-12 pr-12 rounded-xl border border-gray-200 bg-gray-50 text-neutral-black text-sm focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold">
        </div>

        <!-- Terms -->
        <div class="flex items-center gap-2 mt-2">
          <input type="checkbox" [(ngModel)]="termsAccepted" class="w-5 h-5 rounded text-brand-gold focus:ring-brand-gold border-gray-300">
          <span class="text-xs text-neutral-black">Acepto los Términos y Condiciones</span>
        </div>

        <!-- Register Button -->
        <button (click)="register()" class="w-full h-14 mt-4 rounded-2xl bg-brand-gold text-neutral-black font-extrabold text-base shadow-lg shadow-brand-gold/30 active:scale-95 transition-all">
          Registrarme
        </button>

        <!-- Login Link -->
        <div class="flex items-center justify-center gap-1 mt-4 mb-4">
          <span class="text-gray-500 text-sm">¿Ya tienes cuenta?</span>
          <a routerLink="/login" class="text-brand-gold font-bold text-sm">Inicia Sesión</a>
        </div>
      </div>
    </div>
  </div>
</div>
