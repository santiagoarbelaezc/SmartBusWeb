<div class="relative w-full h-full bg-[#E5E9F0] overflow-hidden flex flex-col">
  
  <!-- Fake Map Background Pattern -->
  <div class="absolute inset-0 z-0 opacity-40" style="background-image: radial-gradient(#9E9E9E 1px, transparent 1px); background-size: 20px 20px;"></div>
  
  <!-- Map Route Line Container -->
  <div class="absolute inset-0 flex flex-col justify-center items-center py-32 pl-10 pr-10 z-10 pointer-events-none pb-[280px]">
    <div class="w-full max-w-[200px] h-full flex flex-col justify-between items-start relative mt-10">
      
      <!-- Origin -->
      <div class="flex items-center gap-4 relative z-20">
        <div class="w-5 h-5 rounded-full border-4 border-brand-primary bg-white shadow-md"></div>
        <span class="font-extrabold text-[15px] bg-white/90 px-3 py-1 rounded-lg backdrop-blur-md shadow-sm">Bogotá</span>
      </div>

      <!-- The Line -->
      <div class="absolute top-2 left-[9px] w-[3px] h-[calc(100%-16px)] bg-gray-300 rounded-full z-0">
        <div class="absolute top-0 left-0 w-full bg-green-500 rounded-full transition-all duration-300 shadow-[0_0_10px_rgba(34,197,94,0.6)]"
             [style.height]="progress + '%'"></div>
             
        <!-- The Bus Icon -->
        <div class="absolute w-12 h-12 bg-white rounded-full shadow-xl border border-gray-100 flex items-center justify-center z-30 transition-all duration-300 -ml-[23px] -mt-6"
             [style.top]="progress + '%'">
          <span class="material-icons text-brand-primary text-[24px] transition-colors" [ngClass]="isFinished ? 'text-green-500' : ''">directions_bus</span>
          <!-- Ping effect when moving -->
          <div *ngIf="isSimulating" class="absolute inset-0 rounded-full border-[3px] border-brand-primary animate-ping opacity-60"></div>
        </div>
      </div>

      <!-- Destination -->
      <div class="flex items-center gap-4 relative z-20">
        <div class="w-5 h-5 rounded-full border-4 border-gray-400 bg-white shadow-md transition-colors duration-500"
             [ngClass]="isFinished ? 'border-green-500' : ''"></div>
        <span class="font-extrabold text-[15px] bg-white/90 px-3 py-1 rounded-lg backdrop-blur-md shadow-sm transition-colors duration-500"
              [ngClass]="isFinished ? 'text-green-600' : 'text-neutral-black'">Tunja</span>
      </div>
      
    </div>
  </div>

  <!-- Top Info Bar (Fixed) -->
  <div class="w-full absolute top-0 left-0 pt-12 pb-4 px-6 bg-gradient-to-b from-[#E5E9F0] via-[#E5E9F0]/90 to-transparent z-20 flex justify-between items-center backdrop-blur-sm">
    <div class="flex flex-col">
      <h1 class="text-neutral-black text-2xl font-black tracking-tight">Rastreo en vivo</h1>
      <span class="text-gray-500 text-xs font-semibold">Tiquete #SB-10492</span>
    </div>
    
    <div class="px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-sm transition-colors duration-500"
         [ngClass]="isFinished ? 'bg-green-100 border border-green-200' : 'bg-white border border-gray-100'">
      <span class="material-icons text-[14px] transition-colors duration-500"
            [ngClass]="isFinished ? 'text-green-600' : 'text-brand-primary'">
        {{ isFinished ? 'check_circle' : 'gps_fixed' }}
      </span>
      <span class="text-[10px] font-extrabold tracking-widest uppercase transition-colors duration-500"
            [ngClass]="isFinished ? 'text-green-600' : 'text-neutral-black'">
        {{ tripStatus }}
      </span>
    </div>
  </div>

  <!-- Bottom Panel Container -->
  <div class="absolute bottom-[90px] w-full px-4 z-30">
    <div class="w-full bg-neutral-black rounded-[28px] p-6 shadow-2xl flex flex-col relative overflow-hidden transition-all duration-700"
         [ngClass]="isFinished ? 'border-2 border-green-500 shadow-[0_0_30px_rgba(34,197,94,0.2)]' : ''">
         
      <!-- Success Background Glow -->
      <div *ngIf="isFinished" class="absolute inset-0 bg-green-500/10 pointer-events-none animate-fade-in"></div>

      <!-- Header Info -->
      <div class="flex justify-between items-center w-full z-10">
        <div class="flex flex-col">
          <span class="text-white font-black text-[22px] transition-colors duration-500" [ngClass]="isFinished ? 'text-green-400' : ''">
            {{ isFinished ? '¡Viaje Finalizado!' : 'Bogotá → Tunja' }}
          </span>
          <span class="text-gray-400 text-xs mt-1 font-medium">Conductor: Carlos Mendoza</span>
        </div>
        
        <div class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center border border-white/5">
          <span class="material-icons text-white text-[22px]">speed</span>
        </div>
      </div>
      
      <div class="w-full h-px bg-white/10 my-5 z-10"></div>
      
      <!-- Live Stats -->
      <div class="flex justify-between w-full mb-6 z-10">
        <div class="flex flex-col">
          <span class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-1">Tiempo Restante</span>
          <span class="text-white font-black text-2xl transition-colors duration-500"
                [ngClass]="isFinished ? 'text-green-400' : ''">
            {{ timeLeft }}
          </span>
        </div>
        
        <div class="flex flex-col items-end">
          <span class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-1">Distancia</span>
          <span class="text-white font-black text-2xl transition-colors duration-500"
                [ngClass]="isFinished ? 'text-green-400' : ''">
            {{ distanceLeft }}
          </span>
        </div>
      </div>

      <!-- Action Button -->
      <button *ngIf="!isFinished" (click)="simulateProgress()" class="w-full h-14 rounded-2xl font-extrabold text-[15px] shadow-lg active:scale-95 transition-all duration-300 z-10 flex items-center justify-center gap-2"
              [ngClass]="isSimulating ? 'bg-white/20 text-white pointer-events-none' : 'bg-brand-accent text-black shadow-brand-accent/30'">
        <span *ngIf="!isSimulating">Simular Avance</span>
        <span *ngIf="isSimulating">Simulando...</span>
        <span *ngIf="isSimulating" class="material-icons animate-spin text-lg">sync</span>
      </button>

      <!-- Finished Button -->
      <button *ngIf="isFinished" class="w-full h-14 rounded-2xl bg-green-500 text-black font-extrabold text-[15px] shadow-lg shadow-green-500/30 flex items-center justify-center gap-2 z-10 pointer-events-none animate-slide-up">
        <span class="material-icons">task_alt</span>
        Llegaste a tu destino
      </button>
      
    </div>
  </div>
</div>
