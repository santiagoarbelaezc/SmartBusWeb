<div class="w-full h-screen bg-white flex flex-col relative overflow-hidden">
  
  <!-- Content Area (Router Outlet takes remaining space but has padding at bottom so navbar doesn't cover content) -->
  <div class="flex-1 overflow-hidden w-full h-full relative z-0">
    <router-outlet></router-outlet>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="w-full bg-white shadow-[0_-4px_16px_rgba(0,0,0,0.08)] px-4 pb-4 pt-2 flex justify-between items-center absolute bottom-0 z-50 rounded-t-3xl">
    
    <div *ngFor="let item of navItems" 
         (click)="navigate(item.route)" 
         class="flex flex-col items-center justify-center relative cursor-pointer w-1/5"
         [ngClass]="item.isFab ? 'h-16 -mt-8' : 'h-14'">
         
      <!-- Standard Icon -->
      <div *ngIf="!item.isFab" class="relative flex flex-col items-center">
        <!-- Badge -->
        <div *ngIf="item.badge" class="absolute -top-1 -right-2 bg-brand-primary text-neutral-black text-[9px] font-extrabold w-[16px] h-[16px] flex items-center justify-center rounded-full z-10 border border-white">
          {{ item.badge }}
        </div>
        
        <span class="material-icons text-2xl transition-colors duration-300"
              [ngClass]="isActive(item.route) ? 'text-brand-primary' : 'text-[#9E9E9E]'">
          {{ item.icon }}
        </span>
        
        <!-- Active Pill -->
        <div class="h-[3px] rounded-full bg-brand-primary mt-1 transition-all duration-300"
             [ngClass]="isActive(item.route) ? 'w-8' : 'w-0 opacity-0'">
        </div>
      </div>

      <!-- Standard Label -->
      <span *ngIf="!item.isFab" class="text-[10px] mt-0.5 transition-colors duration-300"
            [ngClass]="isActive(item.route) ? 'text-neutral-black font-semibold' : 'text-[#9E9E9E] font-medium'">
        {{ item.label }}
      </span>

      <!-- FAB Icon (NFC) -->
      <div *ngIf="item.isFab" class="w-16 h-16 rounded-full flex flex-col items-center justify-center shadow-lg shadow-brand-primary/40 transition-transform active:scale-95 border-4 border-white z-50"
           [ngClass]="isActive(item.route) ? 'bg-brand-primary text-neutral-black' : 'bg-neutral-black text-brand-accent'">
        <span class="material-icons text-3xl animate-pulse">{{ item.icon }}</span>
      </div>
    </div>

  </div>
</div>
