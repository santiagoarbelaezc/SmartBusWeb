<div class="w-full h-screen bg-[#F5F3FF] flex flex-col relative overflow-hidden">
  
  <!-- Content Area (Router Outlet takes remaining space but has padding at bottom so navbar doesn't cover content) -->
  <div class="flex-1 overflow-hidden w-full h-full relative z-0">
    <router-outlet></router-outlet>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="w-full bg-white shadow-[0_-4px_16px_rgba(0,0,0,0.08)] px-4 pb-4 pt-2 flex justify-between items-center absolute bottom-0 z-50 rounded-t-3xl">
    
    <div *ngFor="let item of navItems" 
         (click)="navigate(item.route)" 
         class="flex flex-col items-center justify-center relative cursor-pointer w-1/5 h-14">
         
      <!-- Icon with Badge -->
      <div class="relative flex flex-col items-center">
        <!-- Badge -->
        <div *ngIf="item.badge" class="absolute -top-1 -right-2 bg-brand-purple text-neutral-black text-[9px] font-extrabold w-[16px] h-[16px] flex items-center justify-center rounded-full z-10 border border-white">
          {{ item.badge }}
        </div>
        
        <span class="material-icons text-2xl transition-colors duration-300"
              [ngClass]="isActive(item.route) ? 'text-brand-purple' : 'text-[#9E9E9E]'">
          {{ item.icon }}
        </span>
        
        <!-- Active Pill -->
        <div class="h-[3px] rounded-full bg-brand-purple mt-1 transition-all duration-300"
             [ngClass]="isActive(item.route) ? 'w-8' : 'w-0 opacity-0'">
        </div>
      </div>

      <!-- Label -->
      <span class="text-[10px] mt-0.5 transition-colors duration-300"
            [ngClass]="isActive(item.route) ? 'text-neutral-black font-semibold' : 'text-[#9E9E9E] font-medium'">
        {{ item.label }}
      </span>
    </div>

  </div>
</div>
